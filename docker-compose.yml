services:
  frontend:
    build:
      context: ./frontend
      dockerfile: .dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend-go:
    build:
      context: ./backend
      dockerfile: .dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"

  rust-judge:
    build:
      context: ./judge
      dockerfile: .dockerfile
    volumes:
      - ./judge:/judge
      - rust-target:/judge/target
    stop_grace_period: 3s # Workaround for the cargo watch signals taking 10s to stop

  redis:
    image: redis
    volumes:
      - redis-data:/data

  postgres:
    image: postgres
    env_file: ".env"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
      POSTGRES_DB: database
    volumes:
      - postgres-data:/data/postgres

volumes:
  redis-data:
  postgres-data:
  rust-target: