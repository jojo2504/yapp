services:
  frontend:
    build:
      context: ./frontend
      dockerfile: .dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - backend-go

  backend-go:
    build:
      context: ./backend
      dockerfile: .dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  rust-judge:
    build:
      context: ./judge
      dockerfile: .dockerfile
    volumes:
      - ./judge:/judge
      - rust-target:/judge/target
      - /var/run/docker.sock:/var/run/docker.sock
      - shared:/shared
    stop_grace_period: 2s # Workaround for the cargo watch signals taking 10s to stop
    depends_on:
      - backend-go

  rust-test:
    build:
      context: ./judge
      dockerfile: .dockerfile
    command: cargo test -- --nocapture
    volumes:
      - ./judge:/judge
      - rust-target:/judge/target
      - /var/run/docker.sock:/var/run/docker.sock
      - shared:/shared
    depends_on:
      - backend-go

  redis:
    image: redis:8.2.3
    volumes:
      - redis-data:/data
    restart: always
    ports:
      - "6379:6379"
    command: redis-server

  postgres:
    image: postgres
    env_file: ".env"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
      POSTGRES_DB: database
    volumes:
      - postgres-data:/data/postgres

volumes:
  redis-data:
  postgres-data:
  rust-target:
  shared:
    external: true