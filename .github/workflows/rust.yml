name: Rust PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          override: true
          
      # Cache Cargo dependencies and build artifacts
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            judge/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('judge/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            
      - name: Build
        working-directory: ./judge
        run: cargo check --all --all-targets

      - name: Lint
        working-directory: ./judge
        run: cargo clippy --all-targets --all-features

      - name: Format Check (non-blocking)
        working-directory: ./judge
        run: |
          cargo fmt --all -- --check || echo "::warning::Code is not formatted according to rustfmt"

