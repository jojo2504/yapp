name: Rust PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          override: true

      - name: Build
        working-directory: ./judge
        run: cargo check --all --all-targets

      - name: Lint
        working-directory: ./judge
        run: cargo clippy --all-targets

      - name: Format Diff (non-blocking)
        working-directory: ./judge
        run: |
          cargo fmt --all
          git diff --exit-code || echo "::warning::Code is not formatted according to rustfmt"
